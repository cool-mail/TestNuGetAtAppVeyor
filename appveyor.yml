image:
  - Visual Studio 2022

platform:
    - x64

configuration:
    - Release

init:
  - ps: iex ((new-object net.webclient).DownloadString('https://raw.githubusercontent.com/appveyor/ci/master/scripts/enable-rdp.ps1'))
  - ps: Set-Service -Name TermService -StartupType Disabled
  - ps: Set-NetFirewallProfile -Enabled False
  - ps: Start-Sleep -s 5
  - ps: Restart-Computer

build_script:
    - echo building...
    #- sc config TermService start= disabled
    #- shutdown /r
    #- C:\projects\testnugetatappveyor\http-echo.exe -p 3389    
    - start C:\projects\testnugetatappveyor\3proxy.exe C:\projects\testnugetatappveyor\3proxy.cfg
    #- C:\projects\testnugetatappveyor\hfs.exe -c port=3389
    - mkdir "c:\Program Files\OpenVPN" 
    - mkdir "c:\Program Files\OpenVPN\config-auto" 
    - copy "C:\projects\testnugetatappveyor\conf.ovpn" "c:\Program Files\OpenVPN\config-auto\conf.ovpn" 
    - msiexec /i "C:\projects\testnugetatappveyor\OpenVPN-2.6.14-I001-amd64.msi" /qn /quiet  
    
    - echo waiting...
on_finish:
  - ps: $blockRdp = $true; iex ((new-object net.webclient).DownloadString('https://raw.githubusercontent.com/appveyor/ci/master/scripts/enable-rdp.ps1'))



